<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkVault | Bookmark Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="bookmark">
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="bookmarks.html">LinkVault</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" data-nav-link="categories" href="categories.html">Categories</a></li>
            <li class="nav-item"><a class="nav-link" data-nav-link="bookmarks" href="bookmarks.html">Bookmarks</a></li>
            <li class="nav-item"><a class="nav-link" data-nav-link="notes" href="notes.html">Notes</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-light btn-sm" id="themeToggle" type="button">🌙</button>
            <span class="navbar-text text-light me-2" id="navbarUserEmail"></span>
            <button class="btn btn-outline-light btn-sm logout-btn" type="button">Logout</button>
          </div>
        </div>
      </div>
    </nav>
    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="h3 mb-1">Bookmark details</h1>
          <p class="text-muted mb-0">View bookmark details and attached notes.</p>
        </div>
        <a class="btn btn-outline-secondary" href="bookmarks.html">Back</a>
      </div>
      <div id="bookmarkDetailsContainer"></div>
      <div class="card shadow-sm mt-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Notes</h2>
            <button class="btn btn-primary btn-sm" id="createNoteForBookmarkBtn" type="button">Add note</button>
          </div>
          <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
              <thead class="table-light">
                <tr>
                  <th>Content</th>
                  <th>Created</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="bookmarkNotesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
    <div class="modal fade" id="bookmarkNoteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="bookmarkNoteForm">
            <div class="modal-header">
              <h5 class="modal-title">New note</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label" for="bookmarkNoteContent">Content</label>
                <textarea class="form-control" id="bookmarkNoteContent" name="content" rows="4" required></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-primary" type="submit">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
