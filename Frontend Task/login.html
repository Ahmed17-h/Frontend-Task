<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkVault | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="login">
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="text-center mb-4">
                <h1 class="h3 mb-1">LinkVault</h1>
                <p class="text-muted">Organize bookmarks, notes, and categories in one place.</p>
              </div>
              <div class="btn-group w-100 mb-3" role="group" aria-label="Auth modes">
                <button type="button" class="btn btn-outline-primary active" data-auth-mode="login">Login</button>
                <button type="button" class="btn btn-outline-primary" data-auth-mode="register">Register</button>
              </div>
              <form id="loginForm" class="auth-form">
                <div class="alert alert-danger form-alert d-none"></div>
                <div class="mb-3">
                  <label class="form-label" for="loginEmail">Email</label>
                  <input class="form-control" id="loginEmail" name="email" type="email" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="loginPassword">Password</label>
                  <input class="form-control" id="loginPassword" name="password" type="password" required />
                </div>
                <button class="btn btn-primary w-100" type="submit">Login</button>
              </form>
              <form id="registerForm" class="auth-form d-none">
                <div class="alert alert-danger form-alert d-none"></div>
                <div class="mb-3">
                  <label class="form-label" for="registerFullName">Full name</label>
                  <input class="form-control" id="registerFullName" name="fullName" type="text" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="registerEmail">Email</label>
                  <input class="form-control" id="registerEmail" name="email" type="email" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="registerPassword">Password</label>
                  <input class="form-control" id="registerPassword" name="password" type="password" minlength="6" required />
                </div>
                <button class="btn btn-primary w-100" type="submit">Create account</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
