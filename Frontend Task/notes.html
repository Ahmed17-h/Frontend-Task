<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkVault | Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="notes">
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="bookmarks.html">LinkVault</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" data-nav-link="categories" href="categories.html">Categories</a></li>
            <li class="nav-item"><a class="nav-link" data-nav-link="bookmarks" href="bookmarks.html">Bookmarks</a></li>
            <li class="nav-item"><a class="nav-link" data-nav-link="notes" href="notes.html">Notes</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-light btn-sm" id="themeToggle" type="button">🌙</button>
            <span class="navbar-text text-light me-2" id="navbarUserEmail"></span>
            <button class="btn btn-outline-light btn-sm logout-btn" type="button">Logout</button>
          </div>
        </div>
      </div>
    </nav>
    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="h3 mb-1">Notes</h1>
          <p class="text-muted mb-0">Capture ideas and keep notes tied to categories.</p>
        </div>
        <button class="btn btn-primary" id="createNoteBtn" type="button">New note</button>
      </div>
      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="form-label" for="notesCategoryFilter">Category</label>
              <select class="form-select" id="notesCategoryFilter" name="categoryId">
                <option value="">All categories</option>
              </select>
            </div>
            <div class="col-md-8 d-flex justify-content-end">
              <button class="btn btn-outline-secondary" id="clearNotesFilterBtn" type="button">Clear</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
              <thead class="table-light">
                <tr>
                  <th>Title</th>
                  <th>Content</th>
                  <th>Category</th>
                  <th>Pinned</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="notesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
    <div class="modal fade" id="noteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="noteForm">
            <div class="modal-header">
              <h5 class="modal-title">Note</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="noteId" />
              <div class="mb-3">
                <label class="form-label" for="noteTitle">Title</label>
                <input class="form-control" id="noteTitle" name="title" required />
              </div>
              <div class="mb-3">
                <label class="form-label" for="noteContent">Content</label>
                <textarea class="form-control" id="noteContent" name="content" rows="4" required></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label" for="noteCategorySelect">Category</label>
                <select class="form-select" id="noteCategorySelect" name="categoryId" required></select>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-primary" type="submit">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
